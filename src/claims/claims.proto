service ClaimsService {
  rpc CreateClaim (CreateClaimRequest) returns (ClaimResponse);
  rpc GetClaims (GetClaimsRequest) returns (GetClaimsResponse);
  rpc GetClaimsByStatus (GetClaimsByStatusRequest) returns (GetClaimsResponse);
  rpc GetClaimById (GetClaimByIdRequest) returns (ClaimResponse);
  rpc UpdateClaim (UpdateClaimRequest) returns (ClaimResponse);
  rpc DeleteClaim (DeleteClaimRequest) returns (ClaimResponse);
  rpc ChangeStatus (UpdateClaimStatusRequest) returns (ClaimResponse);
}

message CreateClaimRequest {
  string title = 1;
  string description = 2;
  string userId = 3;
}

message GetClaimsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string userId = 3;
}

message GetClaimsByStatusRequest {
  string status = 1;
  int32 limit = 2;
  int32 offset = 3;
  string userId = 4;
}

message GetClaimByIdRequest {
  string id = 1;
  string userId = 2;
}

message UpdateClaimRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  string userId = 4;
}

message DeleteClaimRequest {
  string id = 1;
  string userId = 2;
}

message UpdateClaimStatusRequest {
  string id = 1;
  string status = 2;
  string userId = 3;
}